<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" role="img" aria-label="Routing illustration">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5f5" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="hred" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4444" />
      <stop offset="1" stop-color="#b91c1c" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7f1d1d" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="650" rx="36" fill="url(#hbg)" />

  <g filter="url(#shadow)">
    <rect x="120" y="110" width="660" height="430" rx="28" fill="#ffffff" />
    <rect x="120" y="110" width="660" height="64" rx="28" fill="#fee2e2" />
    <circle cx="160" cy="142" r="10" fill="#ef4444" />
    <circle cx="192" cy="142" r="10" fill="#fca5a5" />
    <circle cx="224" cy="142" r="10" fill="#fecaca" />
  </g>

  <g>
    <path d="M220 260C340 170 450 170 560 250" fill="none" stroke="url(#hred)" stroke-width="14" stroke-linecap="round" />
    <path d="M560 250C640 310 680 370 700 440" fill="none" stroke="url(#hred)" stroke-width="14" stroke-linecap="round" opacity="0.85" />
    <path d="M220 260C240 350 290 420 380 460" fill="none" stroke="url(#hred)" stroke-width="14" stroke-linecap="round" opacity="0.65" />

    <g>
      <circle cx="220" cy="260" r="18" fill="#ffffff" stroke="#ef4444" stroke-width="8" />
      <circle cx="560" cy="250" r="18" fill="#ffffff" stroke="#ef4444" stroke-width="8" />
      <circle cx="380" cy="460" r="18" fill="#ffffff" stroke="#ef4444" stroke-width="8" />
      <circle cx="700" cy="440" r="18" fill="#ffffff" stroke="#ef4444" stroke-width="8" />
    </g>

    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="700" fill="#7f1d1d" font-size="22">
      <text x="245" y="268">/</text>
      <text x="585" y="258">/about</text>
      <text x="405" y="468">/contact</text>
      <text x="725" y="448">/github</text>
    </g>
  </g>
</svg>
